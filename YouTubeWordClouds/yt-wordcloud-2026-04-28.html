// Manual overrides -- words the NRC lexicon misses but are clearly classifiable
// in this feed's context (recurring thinkers and themes)
var OVR={"watts":"joy","alan":"joy","greene":"anger","robert":"anger","bukowski":"sadness","psychology":"trust","financial":"anticipation","audit":"fear","solved":"joy","trauma":"sadness","shadow":"fear","crisis":"fear","rsd":"sadness","empire":"anger","democracy":"trust","habits":"anticipation","signs":"anticipation","become":"anticipation","work":"anticipation","best":"joy"};

function stem(w){
  var c=[];
  if(w.length>4&&w.slice(-3)==="ies")c.push(w.slice(0,-3)+"y");
  if(w.length>4&&w.slice(-2)==="es")c.push(w.slice(0,-2));
  if(w.length>3&&w.slice(-1)==="s"&&w.slice(-2)!=="ss")c.push(w.slice(0,-1));
  if(w.length>5&&w.slice(-3)==="ing"){c.push(w.slice(0,-3));c.push(w.slice(0,-3)+"e");}
  if(w.length>4&&w.slice(-2)==="ed"){c.push(w.slice(0,-2));c.push(w.slice(0,-1));}
  return c;
}

function emotionOf(w){
  if(w==="trump")return"trump";
  if(OVR[w])return OVR[w];
  if(NRC[w])return NRC[w];
  var cands=stem(w);
  for(var i=0;i<cands.length;i++){
    if(OVR[cands[i]])return OVR[cands[i]];
    if(NRC[cands[i]])return NRC[cands[i]];
  }
  return null;
}

function getColor(w){
  var e=emotionOf(w);
  if(e==="trump")return"#D50000";
  return e?C[e]:"#334e6a";
}

// Person names -- excluded from the cloud even though they carry a color,
// so the display reads as emotional language rather than a name-drop list
var NAMES={"trump":1,"jung":1,"carl":1,"alan":1,"watts":1,"robert":1,"greene":1,"david":1,"jesus":1,"jiang":1,"aphex":1,"john":1,"lynch":1,"ram":1,"monk":1,"nietzsche":1,"chris":1,"dostoevsky":1,"xueqin":1,"michael":1,"schopenhauer":1,"plato":1,"machiavelli":1,"epstein":1,"terence":1,"mckenna":1};

var allW=Object.keys(freq).filter(function(w){return w.length>2;}).sort(function(a,b){return freq[b]-freq[a];});
var coloredW=allW.filter(function(w){return emotionOf(w)!==null&&!NAMES[w];});
var topW=coloredW.slice(0,130).map(function(w){return[w,Math.round(15+15*Math.sqrt(freq[w])),getColor(w)];});

var canvas=document.getElementById("wc");
canvas.width=canvas.parentElement.offsetWidth-48;
canvas.height=440;

WordCloud(canvas,{list:topW,gridSize:7,weightFactor:2.4,fontFamily:"system-ui, sans-serif",fontWeight:"700",color:function(w){return getColor(w);},rotateRatio:0.25,rotationSteps:2,backgroundColor:"#0f172a",shrinkToFit:true,minSize:9});

// Emotion signature bar
var totals={};
var emos=["joy","trust","fear","surprise","sadness","disgust","anger","anticipation"];
emos.forEach(function(e){
  var t=allW.reduce(function(s,w){return emotionOf(w)===e?s+freq[w]:s;},0);
  if(t>0)totals[e]={c:C[e],t:t};
});
var trumpT=(freq["trump"]||0)*4;
if(trumpT>0)totals["trump"]={c:"#D50000",t:trumpT};

var grand=Object.keys(totals).reduce(function(s,k){return s+totals[k].t;},0);
var bar=document.getElementById("sig-bar");
Object.keys(totals).forEach(function(n){
  var pct=(totals[n].t/grand*100).toFixed(2);
  if(parseFloat(pct)<0.5)return;
  var seg=document.createElement("div");
  seg.className="seg";
  seg.style.cssText="width:"+pct+"%;background:"+totals[n].c+";flex-shrink:0;";
  bar.appendChild(seg);
});
